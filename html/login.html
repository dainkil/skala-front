<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    /* ===== Design tokens (signUp.html과 동일) ===== */
    :root {
      --cream:      #F5ECE3;   /* background (solid) */
      --ink:        #1e1b17;   /* text / button */
      --muted:      #8a8578;   /* labels / helper text */
      --line:       #d3ccbe;   /* underline (default) */
      --line-focus: #1e1b17;   /* underline (focus) */
      --danger:     #b4462f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--cream);          /* solid cream */
      color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* 로그인 폼은 좁은 폭으로 (signUp와 동일한 톤) */
    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 72px 32px 96px;
    }

    /* ===== Header ===== */
    .page-title {
      margin: 0 0 4px;
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: -.02em;
    }
    .page-sub {
      margin: 0 0 44px;
      color: var(--muted);
      font-size: .98rem;
    }

    /* ===== fieldset / legend ===== */
    fieldset {
      border: 0;
      margin: 0 0 40px;
      padding: 0;
    }
    legend {
      padding: 0;
      margin-bottom: 20px;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Layout grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px 32px;
    }

    /* ===== Underline inputs ===== */
    .field { position: relative; }
    .field > label {
      display: block;
      margin-bottom: 8px;
      font-size: .8rem;
      color: var(--muted);
    }
    .field .req { color: var(--danger); margin-left: 2px; }

    .field input {
      width: 100%;
      padding: 4px 0 8px;
      font-size: 1.2rem;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      transition: border-color .15s;
    }
    .field input::placeholder { color: #b8b1a3; }
    .field input:focus {
      outline: none;
      border-bottom-color: var(--line-focus);
    }

    /* ===== Remember me ===== */
    .agree {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      font-size: .92rem;
      cursor: pointer;
    }
    .agree input {
      width: 17px; height: 17px;
      accent-color: var(--ink);
      flex: none;
    }

    /* ===== Buttons ===== */
    .actions {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 8px;
    }
    button[type="submit"] {
      padding: 16px 40px;
      font: inherit;
      font-size: .92rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--cream);
      background: var(--ink);
      border: 0;
      border-radius: 0;           /* sharp rectangle (reference) */
      cursor: pointer;
      transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .85; }

    button[type="reset"] {
      padding: 0;
      font: inherit;
      font-size: .9rem;
      color: var(--muted);
      background: none;
      border: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
    }
    button[type="reset"]:hover { color: var(--ink); }

    button:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

    .signin {
      margin-top: 32px;
      font-size: .9rem;
      color: var(--muted);
    }
    .signin a { color: var(--ink); font-weight: 600; }

    /* ===== Responsive ===== */
    @media (max-width: 560px) {
      .wrap { padding: 48px 22px 72px; }
      .page-title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="page-title">Welcome back</h1>
    <p class="page-sub">Sign in to your account. (<span style="color:var(--danger)">*</span> required)</p>

    <!-- action: 로그인 후 홈(아코디언)으로 / method: get -->
    <form action="accordion.html" method="get">

      <fieldset>
        <legend>Account</legend>
        <div class="grid">
          <div class="field">
            <label for="userid">Username<span class="req">*</span></label>
            <input type="text" id="userid" name="userid"
                   placeholder="4–16 letters or numbers"
                   minlength="4" maxlength="16"
                   pattern="[A-Za-z0-9]{4,16}" required />
          </div>

          <div class="field">
            <label for="password">Password<span class="req">*</span></label>
            <input type="password" id="password" name="password"
                   placeholder="At least 8 characters" minlength="8" required />
          </div>
        </div>

        <label class="agree">
          <input type="checkbox" name="remember" value="on" />
          <span>Remember me on this device</span>
        </label>
      </fieldset>

      <!-- Submit / Reset -->
      <div class="actions">
        <button type="submit">Sign in</button>
        <button type="reset">Reset</button>
      </div>

      <p class="signin">Don't have an account? <a href="signUp.html">Sign up</a></p>
    </form>
  </main>
</body>
</html>
