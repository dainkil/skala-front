<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome SKALA</title>
<!-- Leaflet(무료 OpenStreetMap 지도): 도시 위치 마커 표시용 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --radius:26px;
    --active-w:60%;                   /* 커서 올라간 사각형의 가로 비율(약 6 : 4) */
    --overlap:clamp(30px,3.4vw,54px); /* 스트립끼리 겹치는 정도(균일) */
    --gap-after:clamp(16px,2vw,30px); /* 펼쳐진 패널과 대기 스트립 사이 간격 */
    --ease:cubic-bezier(.22,.61,.36,1);
    --dur:.55s;
    --overlay-ink:rgba(240,240,240,.9);   /* 연한 회색 텍스트 */
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#000;                /* 양 옆(및 위/아래) 검은색 패딩 */
    color:var(--overlay-ink);
    font-family:"Helvetica Neue",Arial,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  /* ===== 화면 비율에 맞춰 가운데 정렬 (양 옆은 검은 패딩) ===== */
  .stage{
    aspect-ratio:16 / 9;
    height:100vh;
    max-width:100vw;
    padding:clamp(16px,3vh,34px);
    display:flex;
  }

  /* ===== 가로 아코디언 = main ===== */
  .hacc{
    flex:1;
    display:flex;
    align-items:stretch;
    width:100%;
  }

  /* nav: 사각형을 누르면 해당 페이지로 이동 */
  .hacc__nav{
    flex:1;
    display:flex;
    align-items:stretch;              /* 모든 스트립 = 회색 패널과 같은 세로 높이 */
  }

  .panel{
    position:relative;
    flex:1 1 0;                       /* 대기 스트립끼리 남은 40%를 균등 분배 */
    min-width:0;
    margin:0;                         /* figure 기본 여백 제거(세로 높이·정렬 통일) */
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--c);
    border-radius:var(--radius);
    box-shadow:0 12px 30px -12px rgba(0,0,0,.6);
    overflow:hidden;
    cursor:pointer;
    outline:none;
    z-index:1;
    transition:flex-grow var(--dur) var(--ease), flex-basis var(--dur) var(--ease),
               margin var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    -webkit-tap-highlight-color:transparent;
  }
  /* 대기 스트립끼리는 균일하게 겹침(사이 간격 0) */
  .panel + .panel{margin-left:calc(var(--overlap) * -1)}

  /* 기본으로 첫 번째(회색) 패널이 펼쳐진 상태 (가로 약 60%) */
  .panel.is-active{flex:0 0 var(--active-w);z-index:5}
  /* 펼쳐진 패널과 다음 대기 스트립 사이에만 간격 */
  .panel.is-active + .panel{margin-left:var(--gap-after)}

  /* 마우스를 올리거나(hover) 내부 요소에 포커스가 있으면(focus-within):
     올린 패널만 펼치고 나머지는 접힌 채 겹침.
     focus-within 을 함께 거는 이유: select 드롭다운을 열면 마우스가 OS 팝업으로 빠져
     nav:hover 가 풀리는데, 그 순간 회색(is-active) 패널이 다시 펼쳐지면 노랑 패널과 함께
     60%씩 = 120% 로 넘쳐 다른 패널이 밀린다. select 는 열려 있는 동안 포커스를 유지하므로
     focus-within 으로 hover 와 똑같이 접어 레이아웃을 고정한다. */
  .hacc__nav:hover .panel.is-active,
  .hacc__nav:focus-within .panel.is-active{flex:1 1 0;z-index:1}
  .hacc__nav:hover .panel.is-active + .panel,
  .hacc__nav:focus-within .panel.is-active + .panel{margin-left:calc(var(--overlap) * -1)}
  .panel:hover,
  .panel:focus-within{flex:0 0 var(--active-w)!important;z-index:10!important;
    box-shadow:0 22px 44px -16px rgba(0,0,0,.7)}
  .panel:hover + .panel,
  .panel:focus-within + .panel{margin-left:var(--gap-after)!important}

  /* ===== 토글(select)이 선택/포커스된 동안 레이아웃 고정 =====
     select 에 포커스가 있으면(도시를 고르는 중) 다른 패널 위에 커서가 가도
     그 패널이 펼쳐지지 않도록 hover 확장 규칙을 무력화한다.
     포커스를 가진(=열려 있는) 노랑 패널만 그대로 펼쳐진 상태를 유지한다. */
  .hacc__nav:focus-within .panel:hover:not(:focus-within){
    flex:1 1 0!important;z-index:1!important;
    box-shadow:0 12px 30px -12px rgba(0,0,0,.6)!important;
  }
  .hacc__nav:focus-within .panel:hover:not(:focus-within) + .panel{
    margin-left:calc(var(--overlap) * -1)!important;
  }
  .hacc__nav:focus-within .panel:hover:not(:focus-within):not(.panel--pinned) .overlay{opacity:0}
  .hacc__nav:focus-within .panel:hover:not(:focus-within):not(.panel--pinned)::before{opacity:0}

  /* 펼쳐졌을 때 상단 텍스트 가독성용 스크림 */
  .panel::before{
    content:"";position:absolute;inset:0 0 auto 0;height:42%;
    background:linear-gradient(to bottom,rgba(0,0,0,.28),transparent);
    opacity:0;transition:opacity var(--dur) var(--ease);pointer-events:none;
  }
  .panel.is-active::before{opacity:1}
  .hacc__nav:hover .panel.is-active:not(.panel--pinned)::before,
  .hacc__nav:focus-within .panel.is-active:not(.panel--pinned)::before{opacity:0}
  .panel:hover::before,.panel:focus-within::before{opacity:1}

  /* ===== 오버레이 텍스트 (사진처럼 상단에 배치) ===== */
  .overlay{
    position:absolute;
    top:clamp(20px,3.4vw,40px);
    left:clamp(24px,3.6vw,44px);
    right:clamp(24px,3.6vw,44px);
    display:flex;
    flex-wrap:wrap;                   /* 제목이 커지면 버튼(aside)이 아랫줄로 내려가 잘리지 않게 */
    align-items:flex-start;
    justify-content:space-between;
    gap:24px;
    opacity:0;
    transform:translateY(8px);
    transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
    pointer-events:none;              /* 접혀 있을 땐 클릭 통과 */
  }
  .panel.is-active .overlay{opacity:1;transform:none}
  .hacc__nav:hover .panel.is-active:not(.panel--pinned) .overlay,
  .hacc__nav:focus-within .panel.is-active:not(.panel--pinned) .overlay{opacity:0}
  .panel:hover .overlay,
  .panel:focus-within .overlay{opacity:1;transform:none;transition-delay:.1s;pointer-events:auto}

  /* 회색(Welcome) 패널: 다른 곳을 hover 해도 텍스트·버튼을 항상 표시(고정) */
  .panel--pinned .overlay,
  .hacc__nav:hover .panel--pinned .overlay{
    opacity:1;transform:none;pointer-events:auto;
  }

  /* 제목: 굵고 큰 글씨 (사진의 큰 제목처럼). 회색은 h1, 나머지는 링크(a) */
  .overlay h1,
  .ov-title{
    margin:0;
    display:inline-block;
    font-weight:800;
    letter-spacing:-.03em;
    line-height:.96;
    color:var(--overlay-ink);
    white-space:normal;             /* 큰 글씨가 넘치면 줄바꿈 (myHoliday .card-title 참고) */
    overflow-wrap:break-word;
    text-decoration:none;
  }
  /* myHoliday.html 의 .card-title(clamp(3rem,10vw,8rem)) 를 참고해 제목을 크게 */
  .overlay h1{font-size:clamp(3rem,10vw,8rem)}
  .ov-title{font-size:clamp(3rem,10vw,8rem)}
  .ov-title:hover,
  .ov-title:focus-visible{text-decoration:underline}

  /* 부가설명: 작은 글씨 (사진의 본문처럼) */
  .ov-desc{
    display:block;
    margin:14px 0 0;
    font-size:clamp(13px,1.15vw,16px);
    font-weight:400;
    line-height:1.5;
    color:var(--overlay-ink);
    opacity:.88;
    max-width:48ch;
    white-space:normal;
  }

  /* 오른쪽 상단 = aside : 검정 사각 버튼 + 흰 글씨 */
  .ov-aside{white-space:nowrap;margin-left:auto}  /* 아랫줄로 내려가도 오른쪽 정렬 유지 */
  .btn-signin{
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    font-size:clamp(13px,1.2vw,16px);
    font-weight:700;
    letter-spacing:.02em;
    border-radius:6px;
    padding:10px 20px;
    transition:opacity .2s var(--ease);
  }
  .btn-signin:hover{opacity:.82}
  .btn-signin + .btn-signin{margin-left:10px}

  /* ===== Weather 패널: 도시 선택 + 실시간 날씨 박스 ===== */
  .weather-controls{margin-top:18px}
  #city{
    font-family:inherit;
    font-size:clamp(13px,1.15vw,16px);
    font-weight:600;
    padding:9px 14px;
    border:none;
    border-radius:8px;
    background:#000;
    color:#fff;
    cursor:pointer;
  }
  #city:focus-visible{outline:2px solid #fff;outline-offset:2px}
  /* 선택한 도시 위치 지도 (카카오맵풍 카드) */
  #city-map{
    margin-top:14px;
    width:min(460px,100%);
    height:200px;
    border-radius:16px;
    overflow:hidden;
    display:none;                      /* 도시를 고르기 전엔 숨김 */
    box-shadow:0 12px 30px -12px rgba(0,0,0,.5);
  }
  #city-map.is-visible{display:block}
  .leaflet-container{background:#e9e5dc;font-family:inherit}
  #weather-box{
    margin-top:14px;
    display:grid;
    gap:6px;
    font-size:clamp(13px,1.2vw,16px);
    line-height:1.5;
    color:#141414;                    /* 노란 배경 위 가독성 확보 */
  }
  #weather-box:empty{display:none}
  /* ===== iOS 위젯풍 카드 (weather-box 출력) — 가로 컴팩트 타일 ===== */
  #weather-box .wb-card{
    display:flex;
    flex-wrap:wrap;
    align-items:stretch;
    gap:10px;
    max-width:460px;
  }
  #weather-box .wb-tile{
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    min-width:0;
    background:#0e0e0e;                 /* 이미지의 검정 타일 */
    color:#fff;
    border-radius:16px;
    padding:12px 14px;
  }
  #weather-box .wb-label{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    opacity:.6;
    white-space:nowrap;
  }
  #weather-box .wb-value{font-size:clamp(18px,1.8vw,24px);font-weight:700;margin-top:4px}
  #weather-box .wb-sub{font-size:13px;opacity:.72;margin-top:2px}
  /* 큰 온도 타일 = 이미지의 파란 카드 */
  #weather-box .wb-tile--temp{flex:1 1 150px;background:#59b0f6;color:#08243a}
  #weather-box .wb-tile--temp .wb-label{color:#08243a;opacity:.72}
  #weather-box .wb-temp{font-size:clamp(30px,3.4vw,46px);font-weight:800;line-height:1;margin-top:6px}
  #weather-box .wb-tile--temp .wb-city{font-size:14px;font-weight:700;margin-top:8px;letter-spacing:-.01em}
  /* 습도 타일 = 이미지의 주황/빨강 톤 */
  #weather-box .wb-tile--hum{flex:0 1 108px;background:#eb5a2a;color:#fff}
  #weather-box .wb-tile--geo{flex:1 1 128px}
  #weather-box .wb-tile--error{flex:1 1 100%;background:#7a0000;color:#fff}

  /* 접힌 상태의 세로 라벨 (얇은 막대일 때 살짝 힌트) */
  .panel:focus-visible{box-shadow:0 0 0 3px #000,0 0 0 6px var(--overlay-ink)}

  @media (max-width:640px){
    :root{--radius:18px;--overlap:22px;--gap-after:12px}
    .overlay{gap:12px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>

  <!-- 아코디언 전체 = main -->
  <main class="stage">
    <div class="hacc">
      <!-- 사각형을 누르면 해당 html로 이동 -->
      <nav class="hacc__nav" aria-label="SKALA 메뉴">

        <!-- 1. 회색: 환영 인사 (제목·본문은 main 안, Sign in은 aside 안) -->
        <figure class="panel is-active panel--pinned" style="--c:#B5B5B5;--i:1">
          <div class="overlay">
            <div class="ov-main">
              <h1>Welcome</h1>
              <p class="ov-desc">Welcome to SKALA</p>
              <p class="ov-desc">Hi, I'm Dain — a data analyst who turns raw numbers into clear, actionable insights. I enjoy finding the story hidden in data and helping teams make better decisions. Welcome to my portfolio.</p>
            </div>
            <!-- 오른쪽 상단 = aside : 검정 사각 버튼 (Log in / Sign up) -->
            <aside class="ov-aside">
              <a class="btn-signin" href="login.html">Log in</a>
              <a class="btn-signin" href="signUp.html">Sign up</a>
            </aside>
          </div>
        </figure>

        <!-- 2. 보라색: Profile -->
        <figure class="panel" style="--c:#857DB6;--i:2">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myProfile.html">Profile</a>
              <small class="ov-desc">Get to know the person behind the screen! Dive into my personal stats, hidden quirks, and everything that makes me unique. Let the journey begin.</small>
            </div>
          </div>
        </figure>

        <!-- 3. 파랑색: Class -->
        <figure class="panel" style="--c:#1460B3;--i:3">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myClass.html">Class</a>
              <small class="ov-desc">Wondering where I am during the day? Peek into my daily academic hustle and ultimate campus survival guide. Here is the schedule that keeps me busy and fully caffeinated!</small>
            </div>
          </div>
        </figure>

        <!-- 4. 청록색: Grade -->
        <figure class="panel" style="--c:#0094A2;--i:4">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="#" data-grade>Grade</a>
              <small class="ov-desc">The moment of truth has arrived with pure suspense. Check out my hard-earned results, final scores, and whether I conquered the ultimate test. Tears or cheers, it is all right here.</small>
            </div>
          </div>
        </figure>

        <!-- 5. 초록색: Holiday -->
        <figure class="panel" style="--c:#3F6246;--i:5">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myHoliday.html">Holiday</a>
              <small class="ov-desc">When the alarm clock is finally turned off, my real downtime begins. Discover my favorite ways to recharge, from cozy couch marathons to spontaneous weekend escapes.</small>
            </div>
          </div>
        </figure>

        <!-- 6. 갈색: Trip -->
        <figure class="panel" style="--c:#A15041;--i:6">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myTrip.html">Trip</a>
              <small class="ov-desc">Grab your virtual passport and follow along my global footprints! Explore the stunning destinations, hidden gems, and unforgettable memories I have collected on the road.</small>
            </div>
          </div>
        </figure>

        <!-- 7. 주황색: Game -->
        <figure class="panel" style="--c:#F33910;--i:7">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="#" data-game>Game</a>
              <small class="ov-desc">Ready to test your luck and intuition? Challenge yourself with a classic round of the ultimate guessing challenge. Let the brain teasers begin and see if you can beat the odds!</small>
            </div>
          </div>
        </figure>

        <!-- 8. 분홍색: Bag -->
        <figure class="panel" style="--c:#EB64A0;--i:8">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="#" data-bag>Bag</a>
              <small class="ov-desc">They say you can tell a lot about a person by looking at their everyday carry. Take an exclusive sneak peek into my daily essentials, survival tools, and unexpected treasures.</small>
            </div>
          </div>
        </figure>

        <!-- 9. 노랑색: Weather -->
        <figure class="panel" style="--c:#FEBB00;--i:9">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="#" data-weather>Weather</a>
              <small class="ov-desc">Step outside without actually leaving your seat! Get real-time updates on my current coordinates, the exact temperature, and the vibe of the sky right now.</small>

              <!-- 도시 선택 + 실시간 날씨 결과 (realtimeInfo.js 가 채운다) -->
              <div class="weather-controls">
                <select id="city" aria-label="Choose a city">
                  <option value=""         data-lat=""         data-lon="">Select a city…</option>
                  <option value="Seoul"    data-lat="37.5665"  data-lon="126.9780">Seoul</option>
                  <option value="Tokyo"    data-lat="35.6762"  data-lon="139.6503">Tokyo</option>
                  <option value="Beijing"  data-lat="39.9042"  data-lon="116.4074">Beijing</option>
                  <option value="New York" data-lat="40.7128"  data-lon="-74.0060">New York</option>
                  <option value="London"   data-lat="51.5074"  data-lon="-0.1278">London</option>
                  <option value="Paris"    data-lat="48.8566"  data-lon="2.3522">Paris</option>
                  <option value="Berlin"   data-lat="52.5200"  data-lon="13.4050">Berlin</option>
                  <option value="Sydney"   data-lat="-33.8688" data-lon="151.2093">Sydney</option>
                </select>
                <!-- 선택한 도시 위치 지도 (realtimeInfo.js 가 채운다) -->
                <div id="city-map"></div>
                <div id="weather-box"></div>
              </div>
            </div>
          </div>
        </figure>

      </nav>
    </div>
  </main>

<!-- 숫자 맞추기 게임 로직 (startUpDown) -->
<script src="../script/upDown.js"></script>

<!-- 성적 평균 계산 로직 (startGrade) -->
<script src="../script/grade.js"></script>

<!-- 가방 속 물품 목록 로직 (showMyBag) -->
<script src="../script/bag.js"></script>

<!-- Leaflet 지도 라이브러리 (전역 L 제공) — realtimeInfo.js 보다 먼저 로드 -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 실시간 날씨: Open-Meteo API 연동 (ES module) — realtimeInfo → weatherAPI import -->
<script type="module" src="../script/realtimeInfo.js"></script>

<script>
  /* 순수 확장은 CSS(:hover/:focus-within)로 처리.
     키보드 편의를 위해 좌우 화살표로 링크 패널 간 이동만 보조. */
  (function () {
    // 옵션 C: 사각형 아무 곳이나 눌러도 제목 링크로 이동 (제목 링크 자체는 기본 동작)
    document.querySelectorAll('figure.panel').forEach(panel => {
      const link = panel.querySelector('a.ov-title');
      if (!link) return;                     // 회색 패널(제목이 h1)은 전체 클릭 제외
      if (link.hasAttribute('data-game')) {  // Game 패널: 페이지 이동 대신 게임 실행
        panel.addEventListener('click', e => {
          e.preventDefault();                // href="#" 로 인한 상단 이동 방지
          startUpDown();
        });
        return;
      }
      if (link.hasAttribute('data-grade')) { // Grade 패널: 페이지 이동 대신 성적 계산 실행
        panel.addEventListener('click', e => {
          e.preventDefault();                // href="#" 로 인한 상단 이동 방지
          startGrade();
        });
        return;
      }
      if (link.hasAttribute('data-bag')) {   // Bag 패널: 페이지 이동 대신 가방 목록 실행
        panel.addEventListener('click', e => {
          e.preventDefault();                // href="#" 로 인한 상단 이동 방지
          showMyBag();
        });
        return;
      }
      if (link.hasAttribute('data-weather')) { // Weather 패널: 이동 없음, select 로만 조작
        panel.addEventListener('click', e => {
          if (e.target.closest('a')) e.preventDefault(); // 제목(#) 클릭 시 상단 점프만 방지
        });                                  // select/box 클릭은 그대로 통과시킴
        return;
      }
      panel.addEventListener('click', e => {
        if (e.target.closest('a')) return;   // 실제 링크(제목/버튼) 클릭은 그대로 둠
        window.location.href = link.getAttribute('href');
      });
    });

    // 키보드: 좌우 화살표로 제목 링크 간 이동
    const links = Array.from(document.querySelectorAll('a.ov-title'));
    links.forEach((el, i) => {
      el.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') { e.preventDefault(); (links[i + 1] || links[0]).focus(); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); (links[i - 1] || links[links.length - 1]).focus(); }
      });
    });
  })();
</script>
</body>
</html>
