<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Trip</title>
</head>
<!-- CSS 미사용: 모든 스타일은 인라인 style 속성으로만 작성. --cream 변수는 body에 정의 -->
<body style="--cream:#F5ECE3; margin:0; background-color:#F5ECE3; font-family:Arial, Helvetica, sans-serif; color:#2b2622;">

  <!-- ===== 헤더 ===== -->
  <header style="padding:56px 48px 24px; background:var(--cream);">
    <div style="display:flex; align-items:flex-start; gap:12px;">
      <div style="width:4px; height:46px; background:#1c1a17;"></div>
      <div>
        <div style="font-family:monospace; font-size:12px; letter-spacing:2px; color:#1c1a17;">TRAVEL LOG</div>
        <div style="font-size:22px; font-weight:bold; letter-spacing:3px; color:#1c1a17;">MY TRIP</div>
      </div>
    </div>
  </header>

  <!-- ===== 이미지 (media/baseball.jpeg) ===== -->
  <section style="padding:24px 48px; background:var(--cream);">
    <h2 style="font-size:16px; letter-spacing:2px; color:#1c1a17; margin:0 0 14px;">01 &middot; PHOTO</h2>
    <img src="media/baseball.jpeg" alt="야구장에서 남긴 여행 사진"
         style="display:block; width:100%; max-width:720px; height:auto; border:1px solid #cbc9c0;">
    <p style="font-size:13px; color:#8f8a80; margin:10px 0 0;">야구장에서 남긴 한 컷.</p>
  </section>

  <!-- ===== 비디오 (media/trip.mp4) ===== -->
  <section style="padding:24px 48px; background:var(--cream);">
    <h2 style="font-size:16px; letter-spacing:2px; color:#1c1a17; margin:0 0 14px;">02 &middot; VIDEO</h2>
    <video controls preload="metadata"
           style="display:block; width:100%; max-width:720px; height:auto; border:1px solid #cbc9c0; background:#000;">
      <source src="media/trip.mp4" type="video/mp4">
      브라우저가 video 태그를 지원하지 않습니다.
    </video>
    <p style="font-size:13px; color:#8f8a80; margin:10px 0 0;">여행 중 촬영한 영상.</p>
  </section>

  <!-- ===== 오디오 (외부 URL: archive.org) ===== -->
  <section style="padding:24px 48px 64px; background:var(--cream);">
    <h2 style="font-size:16px; letter-spacing:2px; color:#1c1a17; margin:0 0 14px;">03 &middot; AUDIO</h2>
    <audio controls preload="none" style="width:100%; max-width:720px;">
      <source src="https://dn710605.ca.archive.org/0/items/Bolero_201511/Bolero.mp3" type="audio/mpeg">
      브라우저가 audio 태그를 지원하지 않습니다.
    </audio>
    <p style="font-size:13px; color:#8f8a80; margin:10px 0 0;">Bolero &middot; archive.org</p>
  </section>

</body>
</html>
