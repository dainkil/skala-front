<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome SKALA</title>
<style>
  :root{
    --radius:26px;
    --active-w:60%;                   /* 커서 올라간 사각형의 가로 비율(약 6 : 4) */
    --overlap:clamp(30px,3.4vw,54px); /* 스트립끼리 겹치는 정도(균일) */
    --gap-after:clamp(16px,2vw,30px); /* 펼쳐진 패널과 대기 스트립 사이 간격 */
    --ease:cubic-bezier(.22,.61,.36,1);
    --dur:.55s;
    --overlay-ink:rgba(240,240,240,.9);   /* 연한 회색 텍스트 */
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#000;                /* 양 옆(및 위/아래) 검은색 패딩 */
    color:var(--overlay-ink);
    font-family:"Helvetica Neue",Arial,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    display:grid;
    place-items:center;
    overflow:hidden;
  }

  /* ===== 화면 비율에 맞춰 가운데 정렬 (양 옆은 검은 패딩) ===== */
  .stage{
    aspect-ratio:16 / 9;
    height:100vh;
    max-width:100vw;
    padding:clamp(16px,3vh,34px);
    display:flex;
  }

  /* ===== 가로 아코디언 = main ===== */
  .hacc{
    flex:1;
    display:flex;
    align-items:stretch;
    width:100%;
  }

  /* nav: 사각형을 누르면 해당 페이지로 이동 */
  .hacc__nav{
    flex:1;
    display:flex;
    align-items:stretch;              /* 모든 스트립 = 회색 패널과 같은 세로 높이 */
  }

  .panel{
    position:relative;
    flex:1 1 0;                       /* 대기 스트립끼리 남은 40%를 균등 분배 */
    min-width:0;
    margin:0;                         /* figure 기본 여백 제거(세로 높이·정렬 통일) */
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--c);
    border-radius:var(--radius);
    box-shadow:0 12px 30px -12px rgba(0,0,0,.6);
    overflow:hidden;
    cursor:pointer;
    outline:none;
    z-index:1;
    transition:flex-grow var(--dur) var(--ease), flex-basis var(--dur) var(--ease),
               margin var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    -webkit-tap-highlight-color:transparent;
  }
  /* 대기 스트립끼리는 균일하게 겹침(사이 간격 0) */
  .panel + .panel{margin-left:calc(var(--overlap) * -1)}

  /* 기본으로 첫 번째(회색) 패널이 펼쳐진 상태 (가로 약 60%) */
  .panel.is-active{flex:0 0 var(--active-w);z-index:5}
  /* 펼쳐진 패널과 다음 대기 스트립 사이에만 간격 */
  .panel.is-active + .panel{margin-left:var(--gap-after)}

  /* 마우스를 올리면: 올린 패널만 펼치고 나머지는 접힌 채 겹침 */
  .hacc__nav:hover .panel.is-active{flex:1 1 0;z-index:1}
  .hacc__nav:hover .panel.is-active + .panel{margin-left:calc(var(--overlap) * -1)}
  .panel:hover,
  .panel:focus-within{flex:0 0 var(--active-w)!important;z-index:10!important;
    box-shadow:0 22px 44px -16px rgba(0,0,0,.7)}
  .panel:hover + .panel,
  .panel:focus-within + .panel{margin-left:var(--gap-after)!important}

  /* 펼쳐졌을 때 상단 텍스트 가독성용 스크림 */
  .panel::before{
    content:"";position:absolute;inset:0 0 auto 0;height:42%;
    background:linear-gradient(to bottom,rgba(0,0,0,.28),transparent);
    opacity:0;transition:opacity var(--dur) var(--ease);pointer-events:none;
  }
  .panel.is-active::before{opacity:1}
  .hacc__nav:hover .panel.is-active::before{opacity:0}
  .panel:hover::before,.panel:focus-within::before{opacity:1}

  /* ===== 오버레이 텍스트 (사진처럼 상단에 배치) ===== */
  .overlay{
    position:absolute;
    top:clamp(20px,3.4vw,40px);
    left:clamp(24px,3.6vw,44px);
    right:clamp(24px,3.6vw,44px);
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:24px;
    opacity:0;
    transform:translateY(8px);
    transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
    pointer-events:none;              /* 접혀 있을 땐 클릭 통과 */
  }
  .panel.is-active .overlay{opacity:1;transform:none}
  .hacc__nav:hover .panel.is-active .overlay{opacity:0}
  .panel:hover .overlay,
  .panel:focus-within .overlay{opacity:1;transform:none;transition-delay:.1s;pointer-events:auto}

  /* 회색(Welcome) 패널: 다른 곳을 hover 해도 텍스트·버튼을 항상 표시(고정) */
  .panel--pinned .overlay,
  .hacc__nav:hover .panel--pinned .overlay{
    opacity:1;transform:none;pointer-events:auto;
  }

  /* 제목: 굵고 큰 글씨 (사진의 큰 제목처럼). 회색은 h1, 나머지는 링크(a) */
  .overlay h1,
  .ov-title{
    margin:0;
    display:inline-block;
    font-weight:800;
    letter-spacing:-.02em;
    line-height:.98;
    color:var(--overlay-ink);
    white-space:nowrap;
    text-decoration:none;
  }
  .overlay h1{font-size:clamp(28px,4.4vw,54px)}
  .ov-title{font-size:clamp(26px,4vw,48px)}
  .ov-title:hover,
  .ov-title:focus-visible{text-decoration:underline}

  /* 부가설명: 작은 글씨 (사진의 본문처럼) */
  .ov-desc{
    display:block;
    margin:14px 0 0;
    font-size:clamp(13px,1.15vw,16px);
    font-weight:400;
    line-height:1.5;
    color:var(--overlay-ink);
    opacity:.88;
    max-width:48ch;
    white-space:normal;
  }

  /* 오른쪽 상단 = aside : 검정 사각 버튼 + 흰 글씨 */
  .ov-aside{white-space:nowrap}
  .btn-signin{
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    font-size:clamp(13px,1.2vw,16px);
    font-weight:700;
    letter-spacing:.02em;
    border-radius:6px;
    padding:10px 20px;
    transition:opacity .2s var(--ease);
  }
  .btn-signin:hover{opacity:.82}
  .btn-signin + .btn-signin{margin-left:10px}

  /* 접힌 상태의 세로 라벨 (얇은 막대일 때 살짝 힌트) */
  .panel:focus-visible{box-shadow:0 0 0 3px #000,0 0 0 6px var(--overlay-ink)}

  @media (max-width:640px){
    :root{--radius:18px;--overlap:22px;--gap-after:12px}
    .overlay{gap:12px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>

  <!-- 아코디언 전체 = main -->
  <main class="stage">
    <div class="hacc">
      <!-- 사각형을 누르면 해당 html로 이동 -->
      <nav class="hacc__nav" aria-label="SKALA 메뉴">

        <!-- 1. 회색: 환영 인사 (제목·본문은 main 안, Sign in은 aside 안) -->
        <figure class="panel is-active panel--pinned" style="--c:#B5B5B5;--i:1">
          <div class="overlay">
            <div class="ov-main">
              <h1>Welcome</h1>
              <p class="ov-desc">Welcome to SKALA</p>
            </div>
            <!-- 오른쪽 상단 = aside : 검정 사각 버튼 (Log in / Sign up) -->
            <aside class="ov-aside">
              <a class="btn-signin" href="login.html">Log in</a>
              <a class="btn-signin" href="signUp.html">Sign up</a>
            </aside>
          </div>
        </figure>

        <!-- 2. 보라색: Profile -->
        <figure class="panel" style="--c:#857DB6;--i:2">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myProfile.html">Profile</a>
              <small class="ov-desc">Get to know the person behind the screen! Dive into my personal stats, hidden quirks, and everything that makes me unique. Let the journey begin.</small>
            </div>
          </div>
        </figure>

        <!-- 3. 파랑색: Class -->
        <figure class="panel" style="--c:#1460B3;--i:3">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myClass.html">Class</a>
              <small class="ov-desc">Wondering where I am during the day? Peek into my daily academic hustle and ultimate campus survival guide. Here is the schedule that keeps me busy and fully caffeinated!</small>
            </div>
          </div>
        </figure>

        <!-- 4. 청록색: Grade -->
        <figure class="panel" style="--c:#0094A2;--i:4">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myGrade.html">Grade</a>
              <small class="ov-desc">The moment of truth has arrived with pure suspense. Check out my hard-earned results, final scores, and whether I conquered the ultimate test. Tears or cheers, it is all right here.</small>
            </div>
          </div>
        </figure>

        <!-- 5. 초록색: Holiday -->
        <figure class="panel" style="--c:#3F6246;--i:5">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myHoliday.html">Holiday</a>
              <small class="ov-desc">When the alarm clock is finally turned off, my real downtime begins. Discover my favorite ways to recharge, from cozy couch marathons to spontaneous weekend escapes.</small>
            </div>
          </div>
        </figure>

        <!-- 6. 갈색: Trip -->
        <figure class="panel" style="--c:#A15041;--i:6">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="myTrip.html">Trip</a>
              <small class="ov-desc">Grab your virtual passport and follow along my global footprints! Explore the stunning destinations, hidden gems, and unforgettable memories I have collected on the road.</small>
            </div>
          </div>
        </figure>

        <!-- 7. 주황색: Game -->
        <figure class="panel" style="--c:#F33910;--i:7">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="upDown.js">Game</a>
              <small class="ov-desc">Ready to test your luck and intuition? Challenge yourself with a classic round of the ultimate guessing challenge. Let the brain teasers begin and see if you can beat the odds!</small>
            </div>
          </div>
        </figure>

        <!-- 8. 분홍색: Bag -->
        <figure class="panel" style="--c:#EB64A0;--i:8">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="bag.js">Bag</a>
              <small class="ov-desc">They say you can tell a lot about a person by looking at their everyday carry. Take an exclusive sneak peek into my daily essentials, survival tools, and unexpected treasures.</small>
            </div>
          </div>
        </figure>

        <!-- 9. 노랑색: Weather -->
        <figure class="panel" style="--c:#FEBB00;--i:9">
          <div class="overlay">
            <div class="ov-main">
              <a class="ov-title" href="weather.js">Weather</a>
              <small class="ov-desc">Step outside without actually leaving your seat! Get real-time updates on my current coordinates, the exact temperature, and the vibe of the sky right now.</small>
            </div>
          </div>
        </figure>

      </nav>
    </div>
  </main>

<script>
  /* 순수 확장은 CSS(:hover/:focus-within)로 처리.
     키보드 편의를 위해 좌우 화살표로 링크 패널 간 이동만 보조. */
  (function () {
    // 옵션 C: 사각형 아무 곳이나 눌러도 제목 링크로 이동 (제목 링크 자체는 기본 동작)
    document.querySelectorAll('figure.panel').forEach(panel => {
      const link = panel.querySelector('a.ov-title');
      if (!link) return;                     // 회색 패널(제목이 h1)은 전체 클릭 제외
      panel.addEventListener('click', e => {
        if (e.target.closest('a')) return;   // 실제 링크(제목/버튼) 클릭은 그대로 둠
        window.location.href = link.getAttribute('href');
      });
    });

    // 키보드: 좌우 화살표로 제목 링크 간 이동
    const links = Array.from(document.querySelectorAll('a.ov-title'));
    links.forEach((el, i) => {
      el.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') { e.preventDefault(); (links[i + 1] || links[0]).focus(); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); (links[i - 1] || links[links.length - 1]).focus(); }
      });
    });
  })();
</script>
</body>
</html>
